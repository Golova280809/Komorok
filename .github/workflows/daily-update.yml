name: Ежедневное обновление

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Обновление счётчика дней
        run: python scripts/update_stats.py

      - name: Пауза
        run: sleep 20

      - name: Обновление счётчика статей
        run: python scripts/count_articles.py

      - name: Коммит
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Автообновление счётчиков" && git push)